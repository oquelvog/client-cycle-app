<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 130" fill="none">
  <!-- Orbital ring: center (62, 65), radius 43 -->
  <!-- Arc from ~40deg to ~320deg clockwise (280deg arc, gap at top) -->
  <path d="M 89.6 32.1 A 43 43 0 1 1 34.4 32.1"
    stroke="#ffffff" stroke-width="4.5" stroke-linecap="round" fill="none"/>

  <!-- Decorative dots in the gap (top area) -->
  <circle cx="58" cy="20" r="7" fill="#ffffff"/>
  <circle cx="79" cy="24" r="4.5" fill="#ffffff"/>
  <circle cx="91" cy="32" r="3" fill="#ffffff"/>

  <!-- Calendar icon centered at (62, 67) -->
  <rect x="46" y="54" width="32" height="28" rx="5"
    stroke="#ffffff" stroke-width="3.5" fill="none"/>
  <line x1="46" y1="65" x2="78" y2="65" stroke="#ffffff" stroke-width="2.5"/>
  <line x1="55" y1="50" x2="55" y2="58" stroke="#ffffff" stroke-width="4" stroke-linecap="round"/>
  <line x1="69" y1="50" x2="69" y2="58" stroke="#ffffff" stroke-width="4" stroke-linecap="round"/>
  <line x1="54" y1="75" x2="70" y2="75" stroke="#ffffff" stroke-width="3.5" stroke-linecap="round"/>

  <!-- "Annua" wordmark -->
  <text x="118" y="90"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI Rounded', 'Nunito', 'Quicksand', system-ui, sans-serif"
    font-size="58" font-weight="400" fill="#ffffff" letter-spacing="-1">Annua</text>
</svg>
