<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 130" fill="none">
  <!-- Orbital ring: center (62,65) radius 43, 280° arc, gap at top-right (0°→80°) -->
  <!-- Arc from 0°/12-o'clock (62,22) clockwise to 80° (104,58) — large arc -->
  <path d="M 62 22 A 43 43 0 1 1 104 58"
    stroke="#1a3869" stroke-width="4.5" stroke-linecap="round" fill="none"/>

  <!-- Dots in the gap -->
  <circle cx="62" cy="22" r="7"   fill="#1a3869"/>
  <circle cx="83" cy="28" r="4.5" fill="#1a3869"/>
  <circle cx="97" cy="40" r="3"   fill="#1a3869"/>

  <!-- Calendar icon centred at (62,68) -->
  <rect x="46" y="55" width="32" height="27" rx="5"
    stroke="#1a3869" stroke-width="3.5" fill="none"/>
  <line x1="46" y1="66" x2="78" y2="66" stroke="#1a3869" stroke-width="2.5"/>
  <line x1="55" y1="51" x2="55" y2="59" stroke="#1a3869" stroke-width="4" stroke-linecap="round"/>
  <line x1="69" y1="51" x2="69" y2="59" stroke="#1a3869" stroke-width="4" stroke-linecap="round"/>
  <line x1="54" y1="75" x2="70" y2="75" stroke="#1a3869" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Wordmark -->
  <text x="118" y="90"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
    font-size="58" font-weight="400" fill="#1a3869" letter-spacing="-1">Annua</text>
</svg>
