<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 130" fill="none">
  <!-- Orbital ring: center (62, 65), radius 43 -->
  <!-- Arc from ~40deg to ~320deg clockwise (280deg arc, gap at top) -->
  <!-- 40deg position: (62+43*sin40, 65-43*cos40) = (89.6, 32.1) -->
  <!-- 320deg position: (62+43*sin320, 65-43*cos320) = (34.4, 32.1) -->
  <path d="M 89.6 32.1 A 43 43 0 1 1 34.4 32.1"
    stroke="#1a3869" stroke-width="4.5" stroke-linecap="round" fill="none"/>

  <!-- Decorative dots in the gap (top area) -->
  <!-- Large dot at ~355deg (just left of top) -->
  <circle cx="58" cy="20" r="7" fill="#1a3869"/>
  <!-- Medium dot at ~25deg (right of top) -->
  <circle cx="79" cy="24" r="4.5" fill="#1a3869"/>
  <!-- Small dot at ~40deg (right, near arc start) -->
  <circle cx="91" cy="32" r="3" fill="#1a3869"/>

  <!-- Calendar icon centered at (62, 67) -->
  <!-- Outer rounded rect -->
  <rect x="46" y="54" width="32" height="28" rx="5"
    stroke="#1a3869" stroke-width="3.5" fill="none"/>
  <!-- Calendar divider line -->
  <line x1="46" y1="65" x2="78" y2="65" stroke="#1a3869" stroke-width="2.5"/>
  <!-- Binding posts at top -->
  <line x1="55" y1="50" x2="55" y2="58" stroke="#1a3869" stroke-width="4" stroke-linecap="round"/>
  <line x1="69" y1="50" x2="69" y2="58" stroke="#1a3869" stroke-width="4" stroke-linecap="round"/>
  <!-- Date dash in body -->
  <line x1="54" y1="75" x2="70" y2="75" stroke="#1a3869" stroke-width="3.5" stroke-linecap="round"/>

  <!-- "Annua" wordmark -->
  <text x="118" y="90"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI Rounded', 'Nunito', 'Quicksand', system-ui, sans-serif"
    font-size="58" font-weight="400" fill="#1a3869" letter-spacing="-1">Annua</text>
</svg>
